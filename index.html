<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0f0f0f"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>PPL Tracker</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#f0f0f0;min-height:100vh;padding:16px}
    h1{font-size:20px;font-weight:500;margin-bottom:4px}
    h2{font-size:17px;font-weight:500}
    p{line-height:1.5}
    button{font-family:inherit;cursor:pointer}
    input,select,textarea{font-family:inherit}
    #app{max-width:500px;margin:0 auto}

    .btn{display:block;width:100%;padding:10px 16px;background:transparent;border:1px solid #333;border-radius:10px;color:#f0f0f0;font-size:14px;font-weight:500;text-align:left}
    .btn:active{opacity:.7}
    .btn-green{background:#1D9E75;border-color:#1D9E75;color:#fff;text-align:center;padding:13px}
    .btn-red{background:#a32d2d;border-color:#a32d2d;color:#fff;text-align:center;padding:8px}
    .btn-sm{padding:6px 10px;font-size:12px;width:auto}
    .btn-chip{padding:4px 10px;font-size:12px;width:auto;border-radius:8px}
    .btn-chip.active{background:#1a1a1a}
    .btn-icon{background:none;border:none;color:#888;font-size:20px;line-height:1;padding:0}

    .card{border:1px solid #222;border-radius:12px;padding:12px 14px;margin-bottom:10px}
    .tag{display:inline-block;font-size:11px;color:#888;background:#1a1a1a;border-radius:4px;padding:1px 6px;margin-right:4px;margin-top:3px}

    .metric{background:#1a1a1a;border-radius:10px;padding:12px 14px}
    .metric-label{font-size:12px;color:#888;margin-bottom:4px}
    .metric-val{font-size:22px;font-weight:500}
    .metric-unit{font-size:13px;font-weight:400}

    input[type=number],input[type=text],select,textarea{background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#f0f0f0;padding:6px 8px;font-size:13px;width:100%}
    textarea{resize:vertical}

    .dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
    .row{display:flex;gap:8px;align-items:center}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .set-row{display:grid;grid-template-columns:24px 1fr 1fr auto;gap:6px;align-items:center;margin-bottom:6px}
    .set-label{font-size:11px;color:#888}

    .warmup{background:#1a1a1a;border-radius:10px;padding:10px 14px;margin-bottom:14px;border:1px solid #222}
    .warmup p{font-size:12px;color:#ccc;margin:2px 0}

    .pr{font-size:9px;background:#FAC775;color:#412402;border-radius:4px;padding:2px 4px;font-weight:500}

    /* Add exercise panel */
    .add-panel{border:1px solid #2a2a2a;border-radius:12px;padding:14px;margin-bottom:12px;background:#111}
    .add-panel label{font-size:12px;color:#888;display:block;margin-bottom:4px;margin-top:10px}
    .add-panel label:first-child{margin-top:0}

    /* Edit mode toggle on home */
    .edit-badge{font-size:10px;background:#2a2a2a;color:#aaa;border-radius:4px;padding:2px 6px}

    #timer-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;align-items:center;justify-content:center}
    #timer-overlay.show{display:flex}
    #timer-box{background:#1a1a1a;border:1px solid #333;border-radius:14px;padding:1.5rem;width:220px;text-align:center}
    .timer-presets{display:flex;gap:6px;margin-bottom:12px}
    .timer-presets button{flex:1;font-size:11px;padding:4px 0;background:transparent;border:1px solid #333;border-radius:6px;color:#f0f0f0;font-family:inherit;cursor:pointer}
    .timer-presets button.active{background:#252525}

    svg text{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
  </style>
</head>
<body>
<div id="app"></div>

<div id="timer-overlay">
  <div id="timer-box">
    <p style="font-weight:500;font-size:14px;margin-bottom:12px">Rest Timer</p>
    <svg width="88" height="88" style="display:block;margin:0 auto 12px">
      <circle cx="44" cy="44" r="36" fill="none" stroke="#333" stroke-width="5"/>
      <circle id="timer-arc" cx="44" cy="44" r="36" fill="none" stroke="#1D9E75" stroke-width="5"
        stroke-dasharray="226.2" stroke-dashoffset="0" stroke-linecap="round"
        transform="rotate(-90 44 44)" style="transition:stroke-dashoffset 1s linear"/>
      <text id="timer-text" x="44" y="50" text-anchor="middle" font-size="18" font-weight="500" fill="#f0f0f0">1:30</text>
    </svg>
    <div class="timer-presets" id="timer-presets">
      <button onclick="setTimerDur(60)">60s</button>
      <button onclick="setTimerDur(90)" class="active">90s</button>
      <button onclick="setTimerDur(120)">120s</button>
      <button onclick="setTimerDur(180)">180s</button>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <button class="btn btn-sm" style="flex:1;text-align:center" onclick="toggleTimer()">Start</button>
      <button class="btn btn-sm" style="flex:1;text-align:center" onclick="resetTimer()">Reset</button>
    </div>
    <button onclick="closeTimer()" style="background:none;border:none;color:#888;font-size:12px;cursor:pointer">close</button>
  </div>
</div>

<script>
// ── Default programme ──────────────────────────────────────────────────────
const DEFAULT_PROGRAMME = {
  "Push A":[
    {name:"Decline Chest Press Machine",target:"4×12",weight:"35–37.5 kg",note:"Last set, note reps if <12"},
    {name:"Incline Smith Machine Press",target:"4×12",weight:"15–17.5 kg",note:"Control descent, don't lock out"},
    {name:"Seated Chest Press",target:"3×12",weight:"35 kg",note:"Squeeze peak contraction 1 sec"},
    {name:"Machine Fly",target:"3×15",weight:"37.5–42.5 kg",note:"Feel the stretch at bottom"},
    {name:"Dumbbell Side Lateral Raise",target:"3×15",weight:"8 kg",note:"Slight forward lean, lead with elbow"},
    {name:"Low-to-High Cable Fly",target:"3×15",weight:"7.5–10 kg",note:"Full arc, slow eccentric"},
    {name:"Close-Grip DB Bench Press",target:"3×15",weight:"12.5–15 kg",note:"Elbows tucked, tricep focus"},
    {name:"Cable/Machine Crunch",target:"3×20",weight:"25–34 kg",note:"Abs — 3×/week only"},
  ],
  "Pull A":[
    {name:"Chin-Up Pull",target:"3×10",weight:"BW or +5 kg",note:"Retract scapula at top; log reps"},
    {name:"Lat Pulldown",target:"4×12",weight:"50–62 kg",note:"Lead with elbows, chest tall"},
    {name:"Single-Arm Lat Pulldown",target:"3×12",weight:"32.5–35 kg",note:"Full stretch at top"},
    {name:"Cable Row",target:"3×12",weight:"50–54 kg",note:"Pause 1 sec at chest, no swing"},
    {name:"Rear Delt Fly (cable)",target:"3×15",weight:"42.5 kg",note:"Horizontal pull, thumbs down"},
    {name:"DB Flat Bench Pullover",target:"3×15",weight:"17.5 kg",note:"Slight bend in elbows"},
    {name:"DB Curl (bottom half)",target:"3×20",weight:"7.5 kg",note:"Pump focus, constant tension"},
    {name:"Incline DB Curl",target:"3×12",weight:"7–8 kg",note:"Long head / peak builder"},
    {name:"Wrist Pronation",target:"3×20",weight:"7 kg",note:"Forearm on pad, controlled"},
    {name:"Cable/Machine Crunch",target:"3×20",weight:"34 kg",note:"Abs — 2nd session this week"},
  ],
  "Legs A":[
    {name:"Walking Lunges",target:"3×12/leg",weight:"Bodyweight",note:"Do first — activate glutes & hips"},
    {name:"Back Squat",target:"4×8",weight:"15–20 kg",note:"Brace hard; note reps on last set"},
    {name:"RDL",target:"3×12",weight:"20–25 kg",note:"Hip hinge, feel hamstring stretch"},
    {name:"Lying Leg Curl",target:"3×12",weight:"27.5 kg",note:"Direct hamstring isolation"},
    {name:"Leg Press",target:"4×12",weight:"85–95 kg",note:"Feet shoulder-width, full depth"},
    {name:"Leg Extension",target:"3×15",weight:"75 kg",note:"Log weight every session"},
    {name:"Adduction Machine",target:"3×15",weight:"22.5+3.75 kg",note:"Slow eccentric, inner thigh focus"},
    {name:"Standing Calf Raise",target:"3×20",weight:"BW+10 kg",note:"10 sec rest between sets, full ROM"},
  ],
  "Push B":[
    {name:"Dips",target:"3×12",weight:"BW / +12.5 kg",note:"Done first while shoulders are fresh"},
    {name:"DB Shoulder Press",target:"4×12",weight:"15–25 kg",note:"Don't go all the way down (seat 7)"},
    {name:"Seated Chest Press",target:"3×15",weight:"35–42.5 kg",note:"Higher rep, feel the squeeze"},
    {name:"Dumbbell Side Lateral Raise",target:"3×15",weight:"8 kg",note:"Consistent with Push A"},
    {name:"Triceps Rope Pushdown",target:"3×15",weight:"15 kg",note:"Use muscle pump strap, squeeze"},
  ],
  "Pull B":[
    {name:"Chin-Up Pull",target:"3×10",weight:"BW or +5–10 kg",note:"Log every set, track progress"},
    {name:"Barbell Bent-Over Row",target:"3×12",weight:"15–17.5 kg",note:"Hinge, elbows back not flared"},
    {name:"Machine Lat Pull",target:"3×12",weight:"45–50 kg",note:"Chest to bar, full stretch"},
    {name:"Rear Delt Fly (sideways)",target:"3×15",weight:"42.5–45 kg",note:"Consistent with Pull A weight"},
    {name:"Barbell Reverse-Grip Curl",target:"3×12",weight:"20–25 kg",note:"Brachialis & forearm builder"},
    {name:"Cable Biceps Curl",target:"3×12",weight:"12.5 kg",note:"Squeeze at top, slow eccentric"},
    {name:"Incline DB Curl",target:"3×12",weight:"7–8 kg",note:"Long head / peak emphasis"},
    {name:"Cable/Machine Crunch",target:"3×20",weight:"34 kg",note:"Abs — 3rd and final this week"},
  ],
  "Legs B":[
    {name:"Lying Leg Curl",target:"3×12",weight:"27.5–30 kg",note:"Hamstring focus, control the drop"},
    {name:"Linear Hack Squat",target:"3×10",weight:"40–45 kg",note:"Own movement, not a lighter squat"},
    {name:"Leg Press",target:"4×12",weight:"90–100 kg",note:"Progressive — aim +2.5 kg/week"},
    {name:"Bulgarian Split Squat",target:"3×12/leg",weight:"2×8 kg DBs",note:"Glute/quad shaper"},
    {name:"Glute-Ham Raise / Nordic Curl",target:"3×15",weight:"BW or +5 kg",note:"Full ROM, slow eccentric"},
    {name:"Standing Calf Raise",target:"3×20",weight:"+10–15 kg",note:"Log weight every session"},
  ],
};

const WARMUPS = {
  "Pull A":[{name:"Face Pull",sets:"2×15",weight:"20 kg",note:"Elbows high"},{name:"Cable External Rotation",sets:"2×15",weight:"light"}],
  "Push B":[{name:"Face Pull",sets:"2×20",weight:"20 kg",note:"Elbows high"},{name:"Cable External Rotation",sets:"2×15",weight:"light"}],
  "Pull B":[{name:"Face Pull",sets:"2×15",weight:"light"}],
};

const DAYS = ["Push A","Pull A","Legs A","Push B","Pull B","Legs B"];
const DAY_TYPE = {"Push A":"Push","Pull A":"Pull","Legs A":"Legs","Push B":"Push","Pull B":"Pull","Legs B":"Legs"};
const DAY_COLOR = {Push:"#1D9E75",Pull:"#378ADD",Legs:"#D85A30"};

// Load programme from localStorage or use default
let PROGRAMME = JSON.parse(localStorage.getItem("ppl_programme")||"null") || JSON.parse(JSON.stringify(DEFAULT_PROGRAMME));
let sessions = JSON.parse(localStorage.getItem("ppl_sessions")||"[]");
let currentSession = null;
let view = "home";
let historyFilter = "All";
let progressEx = "";
let editMode = false; // home edit mode
let showAddPanel = null; // which day is showing add form

function save(){ localStorage.setItem("ppl_sessions", JSON.stringify(sessions)); }
function saveProg(){ localStorage.setItem("ppl_programme", JSON.stringify(PROGRAMME)); }
function genId(){ return Date.now().toString(36)+Math.random().toString(36).slice(2); }
function fmt(iso){ return new Date(iso).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"}); }
function getPR(name){ let b=null; for(const s of sessions) for(const e of s.exercises) if(e.name===name) for(const st of e.sets){const w=parseFloat(st.weight)||0;if(!b||w>b)b=w;} return b; }
function render(){ document.getElementById("app").innerHTML = views[view](); }

// ── Timer ──────────────────────────────────────────────────────────────────
let timerDur=90,timerRem=90,timerRunning=false,timerInterval=null;
const CIRC=226.2;
function updateTimerUI(){
  const pct=timerRem/timerDur;
  document.getElementById("timer-arc").style.strokeDashoffset=CIRC*(1-pct);
  const m=Math.floor(timerRem/60),s=String(timerRem%60).padStart(2,"0");
  document.getElementById("timer-text").textContent=`${m}:${s}`;
  document.querySelector("#timer-box button[onclick='toggleTimer()']").textContent=timerRunning?"Pause":"Start";
}
function setTimerDur(s){ timerDur=s;timerRem=s;timerRunning=false;clearInterval(timerInterval);
  document.querySelectorAll(".timer-presets button").forEach(b=>b.classList.toggle("active",b.textContent===s+"s"));
  updateTimerUI();
}
function toggleTimer(){
  timerRunning=!timerRunning;
  if(timerRunning){ timerInterval=setInterval(()=>{ if(timerRem<=1){timerRem=0;timerRunning=false;clearInterval(timerInterval);}else timerRem--; updateTimerUI(); },1000); }
  else clearInterval(timerInterval);
  updateTimerUI();
}
function resetTimer(){ timerRunning=false;clearInterval(timerInterval);timerRem=timerDur;updateTimerUI(); }
function openTimer(){ document.getElementById("timer-overlay").classList.add("show"); updateTimerUI(); }
function closeTimer(){ document.getElementById("timer-overlay").classList.remove("show"); }

// ── Programme editing ──────────────────────────────────────────────────────
function removeProgExercise(day, idx){
  if(!confirm(`Remove "${PROGRAMME[day][idx].name}" from ${day}?`)) return;
  PROGRAMME[day].splice(idx,1); saveProg(); render();
}
function toggleAddPanel(day){
  showAddPanel = showAddPanel===day ? null : day; render();
}
function submitNewExercise(day){
  const name=document.getElementById("new-name").value.trim();
  const target=document.getElementById("new-target").value.trim();
  const weight=document.getElementById("new-weight").value.trim();
  const note=document.getElementById("new-note").value.trim();
  if(!name){ alert("Exercise name is required."); return; }
  PROGRAMME[day].push({name, target:target||"", weight:weight||"", note:note||""});
  saveProg(); showAddPanel=null; render();
}

// ── Views ──────────────────────────────────────────────────────────────────
const views = {
  home(){
    const recent=sessions.slice(0,3).map(s=>`
      <div class="card row" style="justify-content:space-between">
        <div class="row" style="gap:10px">
          <span class="dot" style="background:${DAY_COLOR[DAY_TYPE[s.day]]}"></span>
          <span style="font-weight:500;font-size:14px">${s.day}</span>
          <span style="font-size:12px;color:#888">${s.exercises.length} exercises</span>
        </div>
        <span style="font-size:12px;color:#888">${fmt(s.date)}</span>
      </div>`).join("");

    const dayRows = DAYS.map(d=>{
      const exList = editMode ? PROGRAMME[d].map((ex,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #1a1a1a">
          <span style="flex:1;font-size:13px">${ex.name}</span>
          <span class="tag">${ex.target}</span>
          <button class="btn-icon" style="font-size:16px;color:#a32d2d" onclick="removeProgExercise('${d}',${i})">×</button>
        </div>`).join("") : "";

      const addForm = (editMode && showAddPanel===d) ? `
        <div class="add-panel" style="margin-top:10px">
          <label>Exercise name *</label>
          <input type="text" id="new-name" placeholder="e.g. Cable Fly"/>
          <label>Sets × reps</label>
          <input type="text" id="new-target" placeholder="e.g. 3×12"/>
          <label>Weight / load</label>
          <input type="text" id="new-weight" placeholder="e.g. 20–25 kg"/>
          <label>Note (optional)</label>
          <input type="text" id="new-note" placeholder="e.g. slow eccentric"/>
          <div style="display:flex;gap:8px;margin-top:12px">
            <button class="btn btn-green" style="flex:1;padding:9px" onclick="submitNewExercise('${d}')">Add</button>
            <button class="btn" style="flex:1;padding:9px;text-align:center" onclick="toggleAddPanel('${d}')">Cancel</button>
          </div>
        </div>` : "";

      const addBtn = editMode ? `
        <button class="btn btn-chip" style="margin-top:8px;color:#1D9E75;border-color:#1D9E75;width:100%;text-align:center"
          onclick="toggleAddPanel('${d}')">+ Add exercise</button>` : "";

      return `
        <div class="card" style="margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:12px" onclick="${editMode?"":`startSession('${d}')`}" style="cursor:${editMode?"default":"pointer"}">
            <span class="dot" style="background:${DAY_COLOR[DAY_TYPE[d]]}"></span>
            <span style="flex:1;font-weight:500">${d}</span>
            <span style="font-size:11px;color:#888">${PROGRAMME[d].length} exercises</span>
            ${editMode?"":`<span style="font-size:11px;color:#666">${sessions.filter(s=>s.day===d).length} logged</span>`}
          </div>
          ${editMode?`<div style="margin-top:8px">${exList}</div>`:""}
          ${addForm}
          ${addBtn}
        </div>`;
    }).join("");

    return `
      <div class="row" style="justify-content:space-between;margin-bottom:1.5rem">
        <h1>PPL Tracker</h1>
        <div class="row" style="gap:6px">
          <button class="btn btn-sm" onclick="openTimer()">Timer</button>
          <button class="btn btn-sm" onclick="go('history')">History</button>
          <button class="btn btn-sm" onclick="go('progress')">Progress</button>
        </div>
      </div>

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <p style="font-size:13px;color:#888">${editMode?"Editing programme":"Start a session"}</p>
        <button class="btn btn-chip ${editMode?"active":""}" onclick="editMode=!editMode;showAddPanel=null;render()">
          ${editMode?"Done editing":"Edit programme"}
        </button>
      </div>

      ${editMode ? dayRows : DAYS.map(d=>`
        <button class="btn" style="display:flex;align-items:center;gap:12px;padding:13px 16px;margin-bottom:8px" onclick="startSession('${d}')">
          <span class="dot" style="background:${DAY_COLOR[DAY_TYPE[d]]}"></span>
          <span style="flex:1;font-weight:500">${d}</span>
          <span style="font-size:11px;color:#888">${PROGRAMME[d].length} exercises</span>
          <span style="font-size:11px;color:#666">${sessions.filter(s=>s.day===d).length} logged</span>
        </button>`).join("")}

      ${!editMode && sessions.length ? `<p style="font-size:13px;color:#888;margin:1.5rem 0 8px">Recent</p>${recent}` : ""}`;
  },

  session(){
    const s=currentSession;
    const wu=(WARMUPS[s.day]||[]).map(w=>`<p>${w.name} — ${w.sets} @ ${w.weight}${w.note?" · "+w.note:""}</p>`).join("");
    const exHtml=s.exercises.map((ex,ei)=>{
      const pr=getPR(ex.name);
      const sets=ex.sets.map((st,si)=>`
        <div class="set-row">
          <span style="font-size:12px;color:#888;text-align:center">${si+1}</span>
          <input type="number" placeholder="kg" value="${st.weight}" min="0" step="0.5"
            oninput="updateSet(${ei},${si},'weight',this.value)"/>
          <input type="number" placeholder="reps" value="${st.reps}" min="0"
            oninput="updateSet(${ei},${si},'reps',this.value)"/>
          <div class="row" style="gap:4px">
            ${pr!==null&&parseFloat(st.weight)>pr?'<span class="pr">PR</span>':""}
            <button class="btn-icon" onclick="removeSet(${ei},${si})">×</button>
          </div>
        </div>`).join("");
      return `
        <div class="card">
          <div class="row" style="justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div style="flex:1">
              <span style="font-weight:500;font-size:14px">${ex.name}</span><br>
              <span class="tag">${ex.target}</span><span class="tag">${ex.suggestedWeight}</span>
              ${ex.programNote?`<p style="font-size:11px;color:#666;font-style:italic;margin-top:4px">${ex.programNote}</p>`:""}
            </div>
            <button class="btn-icon" onclick="removeExercise(${ei})">×</button>
          </div>
          <div class="set-row" style="margin-bottom:4px">
            <span></span><span class="set-label">kg</span><span class="set-label">reps</span><span></span>
          </div>
          ${sets}
          <button class="btn btn-chip" style="margin-top:4px;font-size:12px;color:#888;text-align:center;width:100%" onclick="addSet(${ei})">+ Add set</button>
          <textarea placeholder="Session notes..." rows="1" style="margin-top:8px;font-size:12px"
            oninput="updateNote(${ei},this.value)">${ex.note}</textarea>
          ${pr?`<p style="font-size:11px;color:#666;margin-top:4px">All-time PR: ${pr} kg</p>`:""}
        </div>`;
    }).join("");

    // Quick-add from programme exercises not already in session
    const used=s.exercises.map(e=>e.name);
    const available=PROGRAMME[s.day].filter(e=>!used.includes(e.name));
    const quickAdd=available.length?`
      <div style="margin-bottom:12px">
        <p style="font-size:12px;color:#888;margin-bottom:8px">Add exercise</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${available.map(e=>`<button class="btn btn-chip" onclick="addExerciseToSession('${e.name.replace(/'/g,"\\'")}')">+ ${e.name}</button>`).join("")}
        </div>
      </div>`:"";

    return `
      <div class="row" style="justify-content:space-between;margin-bottom:1.25rem">
        <div class="row" style="gap:10px">
          <button class="btn-icon" onclick="go('home');currentSession=null">&#8592;</button>
          <div><h2>${s.day}</h2><span style="font-size:12px;color:#888">${fmt(s.date)}</span></div>
        </div>
        <button class="btn btn-sm" onclick="openTimer()">Timer</button>
      </div>
      ${wu?`<div class="warmup"><p style="font-weight:500;font-size:12px;color:#888;margin-bottom:6px">Warm-up (do first)</p>${wu}</div>`:""}
      ${exHtml}
      ${quickAdd}
      <button class="btn btn-green" onclick="finishSession()">Finish session</button>`;
  },

  history(){
    const filtered=historyFilter==="All"?sessions:sessions.filter(s=>s.day===historyFilter);
    const chips=["All",...DAYS].map(d=>`
      <button class="btn btn-chip ${historyFilter===d?"active":""}" onclick="setHistFilter('${d}')">${d}</button>`).join("");
    const rows=filtered.map(s=>`
      <div class="card">
        <div class="row" style="justify-content:space-between;margin-bottom:8px">
          <div class="row" style="gap:8px">
            <span class="dot" style="background:${DAY_COLOR[DAY_TYPE[s.day]]}"></span>
            <span style="font-weight:500;font-size:14px">${s.day}</span>
          </div>
          <div class="row" style="gap:10px">
            <span style="font-size:12px;color:#888">${fmt(s.date)}</span>
            <button class="btn-icon" style="font-size:16px" onclick="delSession('${s.id}')">×</button>
          </div>
        </div>
        ${s.exercises.map(ex=>`
          <div style="margin-bottom:5px">
            <span style="font-size:13px;font-weight:500">${ex.name}</span>
            <span style="font-size:12px;color:#888;margin-left:8px">${ex.sets.filter(st=>st.weight||st.reps).map(st=>`${st.weight||"?"}kg×${st.reps||"?"}`).join(" · ")}</span>
            ${ex.note?`<p style="font-size:11px;color:#666;font-style:italic;margin-top:2px">${ex.note}</p>`:""}
          </div>`).join("")}
      </div>`).join("");
    return `
      <div class="row" style="gap:10px;margin-bottom:1.25rem">
        <button class="btn-icon" onclick="go('home')">&#8592;</button><h2>History</h2>
      </div>
      <div class="row" style="flex-wrap:wrap;gap:6px;margin-bottom:1rem">${chips}</div>
      ${filtered.length===0?`<p style="color:#888;font-size:13px">No sessions logged yet.</p>`:rows}`;
  },

  progress(){
    const allEx=[...new Set(sessions.flatMap(s=>s.exercises.map(e=>e.name)))];
    const sel=progressEx||(allEx[0]||"");
    if(!allEx.length) return `
      <div class="row" style="gap:10px;margin-bottom:1.25rem">
        <button class="btn-icon" onclick="go('home')">&#8592;</button><h2>Progress</h2>
      </div>
      <p style="color:#888;font-size:13px">Log some sessions first.</p>`;
    const opts=allEx.map(e=>`<option ${e===sel?"selected":""}>${e}</option>`).join("");
    const points=sessions.slice().reverse()
      .filter(s=>s.exercises.some(e=>e.name===sel))
      .map(s=>({date:s.date,best:Math.max(...s.exercises.filter(e=>e.name===sel).flatMap(e=>e.sets.map(st=>parseFloat(st.weight)||0)))}))
      .filter(p=>p.best>0);
    const maxW=points.length?Math.max(...points.map(p=>p.best)):0;
    const W=Math.max(300,points.length*60);
    const chartSvg=points.length>=2?`
      <div class="card" style="overflow-x:auto;padding:16px 12px">
        <svg viewBox="0 0 ${W} 120" style="width:100%;min-width:300px;height:120px;display:block">
          ${points.map((p,i)=>{
            const x=20+i*(W-40)/(points.length-1);
            const y=100-(p.best/maxW)*80;
            const nx=points[i+1]?20+(i+1)*(W-40)/(points.length-1):null;
            const ny=points[i+1]?100-(points[i+1].best/maxW)*80:null;
            return `${nx?`<line x1="${x}" y1="${y}" x2="${nx}" y2="${ny}" stroke="#1D9E75" stroke-width="1.5"/>`:""}
            <circle cx="${x}" cy="${y}" r="4" fill="#1D9E75"/>
            <text x="${x}" y="${y-7}" text-anchor="middle" font-size="9" fill="#888">${p.best}</text>
            <text x="${x}" y="115" text-anchor="middle" font-size="8" fill="#666">${fmt(p.date).slice(0,6)}</text>`;
          }).join("")}
        </svg>
      </div>`:`<p style="color:#888;font-size:13px">Need at least 2 sessions with this exercise to show a chart.</p>`;
    return `
      <div class="row" style="gap:10px;margin-bottom:1.25rem">
        <button class="btn-icon" onclick="go('home')">&#8592;</button><h2>Progress</h2>
      </div>
      <select style="margin-bottom:1.25rem" onchange="progressEx=this.value;render()">${opts}</select>
      ${points.length?`<div class="grid2" style="margin-bottom:1.25rem">
        <div class="metric"><p class="metric-label">All-time PR</p><p class="metric-val">${maxW} <span class="metric-unit">kg</span></p></div>
        <div class="metric"><p class="metric-label">Sessions</p><p class="metric-val">${points.length}</p></div>
      </div>`:""}
      ${chartSvg}`;
  }
};

// ── Actions ────────────────────────────────────────────────────────────────
function go(v){ view=v; render(); window.scrollTo(0,0); }
function startSession(day){
  currentSession={id:genId(),day,date:new Date().toISOString(),
    exercises:PROGRAMME[day].map(ex=>({id:genId(),name:ex.name,target:ex.target,suggestedWeight:ex.weight,programNote:ex.note,sets:[{weight:"",reps:""}],note:""}))};
  go("session");
}
function addExerciseToSession(name){
  const ex=PROGRAMME[currentSession.day].find(e=>e.name===name);
  currentSession.exercises.push({id:genId(),name,target:ex?ex.target:"",suggestedWeight:ex?ex.weight:"",programNote:ex?ex.note:"",sets:[{weight:"",reps:""}],note:""});
  render();
}
function updateSet(ei,si,field,val){ currentSession.exercises[ei].sets[si][field]=val; }
function addSet(ei){ currentSession.exercises[ei].sets.push({weight:"",reps:""}); render(); }
function removeSet(ei,si){ currentSession.exercises[ei].sets.splice(si,1); render(); }
function removeExercise(ei){ currentSession.exercises.splice(ei,1); render(); }
function updateNote(ei,val){ currentSession.exercises[ei].note=val; }
function finishSession(){ sessions.unshift(currentSession); save(); currentSession=null; go("home"); }
function delSession(id){ sessions=sessions.filter(s=>s.id!==id); save(); render(); }
function setHistFilter(f){ historyFilter=f; render(); }

render();
</script>
<script>
if('serviceWorker' in navigator){ navigator.serviceWorker.register('sw.js'); }
</script>
</body>
